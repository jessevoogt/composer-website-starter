currentThemeId: concert-hall
colorBackground: '#f6f1e8'
colorBackgroundSoft: '#ffffff'
colorText: '#1a1a1a'
colorTextMuted: '#5d5a55'
colorAccent: '#6e0f1a'
colorAccentStrong: '#b08d57'
colorButton: '#6e0f1a'
colorButtonText: '#ffffff'
focusRingColor: '#000000'
navActiveUnderline: ''
navActiveText: ''
navHoverUnderline: ''
navHoverText: ''
scrimColor: ''
