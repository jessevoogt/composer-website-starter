# work.yaml — Copy this file into your work folder and fill in the fields.
# The folder name becomes the URL slug (e.g. folder "nocturne" → example.com/music/nocturne/)

# ── Required ──────────────────────────────────────────────────────────────────

title: ""
# composer: "Composer Name"   # Defaults to config value; uncomment to override
description: ""

# ── Optional descriptive ──────────────────────────────────────────────────────

# subtitle: ""
# duration: "ca. 6' 30\""
# completionDate: "2025-01-01"
# difficulty: ""              # e.g. Beginner, Intermediate, Advanced
# programNote: ""
# perusalScore: "score.pdf"   # Filename of PDF in this folder (generates watermarked perusal viewer)

# ── Thumbnail ─────────────────────────────────────────────────────────────────
# Place a high-res image named "thumbnail.jpg" (or .png, .webp) in this folder.
# The ingest script auto-detects it and resizes/converts it to WebP.

thumbnail:
  alt: ""                     # Describe the image for accessibility
  # crop: "cc"                # Optional crop hint: tl tc tr cl cc cr bl bc br

# ── Categorization ────────────────────────────────────────────────────────────

tags: []
#  - "Piano"
#  - "Solo"
#  - "Romantic"

instrumentation: []
#  - "piano"

searchKeywords: []
#  - "additional search term"

# ── Featured work ─────────────────────────────────────────────────────────────

selected: false
# selectedOrder: 1            # Integer to control ordering among selected works

# ── Recordings ────────────────────────────────────────────────────────────────
# Each recording is listed here inline. Asset files (mp3, photo) live in a
# subfolder under recordings/{folder}/. The folder name is used to locate
# those files — use a numeric prefix to control display order.

